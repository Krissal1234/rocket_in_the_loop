services:
  ritl:
    build: .
    container_name: ritl
    volumes:
      - .:/app
    ports:
      - "50101:50101"
    extra_hosts:
      - "host.docker.internal:host-gateway"    # lets container reach host on Linux
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - ritl-net

networks:
  ritl-net:
    driver: bridge
services:


# Orchestrator + Rocketpy
  ritl:
    build: .
    container_name: ritl
    volumes:
      - .:/app
    ports:
      - "5561:5561"    # sensor data telemetry -> FSW
      - "5562:5562"    # fsw actuation -> ritl
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - ritl-net

  # # ── F Prime container ───────────────────────────────────────────────────────
  # fprime:
  #   image: nasacrl/fprime:latest      # official f prime image, no build needed
  #   container_name: fprime
  #   volumes:
  #     - ./fprime:/fprime/project      # your fprime project mounted in
  #   ports:
  #     - "5000:5000"                   # GDS web UI — open localhost:5000 in browser
  #   networks:
  #     - ritl-net

networks:
  ritl-net:
    driver: bridge
